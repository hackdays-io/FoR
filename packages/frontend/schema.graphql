scalar BigInt
scalar BigDecimal
scalar Bytes
scalar Int8

enum OrderDirection {
  asc
  desc
}

enum TransferViaRouter_orderBy {
  id
  sender
  from
  to
  totalAmount
  fundAmount
  burnAmount
  recipientAmount
  blockNumber
  timestamp
  transactionHash
  logIndex
}

enum DistributionRatio_orderBy {
  id
  changedBy
  fundRatio
  burnRatio
  recipientRatio
  blockNumber
  timestamp
  transactionHash
  logIndex
}

enum User_orderBy {
  id
}

type TransferViaRouter {
  id: ID!
  sender: User!
  from: User!
  to: User!
  totalAmount: BigInt!
  fundAmount: BigInt!
  burnAmount: BigInt!
  recipientAmount: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
}

type DistributionRatio {
  id: ID!
  changedBy: User!
  fundRatio: BigInt!
  burnRatio: BigInt!
  recipientRatio: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
}

type User {
  id: ID!
  sentTransfersViaRouter(first: Int, skip: Int, orderBy: TransferViaRouter_orderBy, orderDirection: OrderDirection): [TransferViaRouter!]!
  receivedTransfersViaRouter(first: Int, skip: Int, orderBy: TransferViaRouter_orderBy, orderDirection: OrderDirection): [TransferViaRouter!]!
  executedTransfersViaRouter(first: Int, skip: Int, orderBy: TransferViaRouter_orderBy, orderDirection: OrderDirection): [TransferViaRouter!]!
  ratioChanges(first: Int, skip: Int, orderBy: DistributionRatio_orderBy, orderDirection: OrderDirection): [DistributionRatio!]!
}

type Query {
  transferViaRouter(id: ID!): TransferViaRouter
  transferViaRouters(first: Int, skip: Int, orderBy: TransferViaRouter_orderBy, orderDirection: OrderDirection, where: TransferViaRouter_filter): [TransferViaRouter!]!
  user(id: ID!): User
  users(first: Int, skip: Int, orderBy: User_orderBy, orderDirection: OrderDirection): [User!]!
  distributionRatio(id: ID!): DistributionRatio
  distributionRatios(first: Int, skip: Int, orderBy: DistributionRatio_orderBy, orderDirection: OrderDirection): [DistributionRatio!]!
}

input TransferViaRouter_filter {
  from: String
  to: String
  sender: String
}
