specVersion: 1.3.0
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: Router
    network: {{network}}
    source:
      address: "{{routerAddress}}"
      abi: Router
      startBlock: {{routerStartBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Transfer
        - DistributionRatio
        - User
      abis:
        - name: Router
          file: ../contract/artifacts/contracts/Router.sol/Router.json
      eventHandlers:
        - event: TransferWithDistribution(indexed address,indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleTransferWithDistribution
        - event: DistributionRatioUpdated(indexed address,uint256,uint256,uint256)
          handler: handleDistributionRatioUpdated
      file: ./src/mapping.ts

  - kind: ethereum/contract
    name: FoRToken
    network: {{network}}
    source:
      address: "{{forTokenAddress}}"
      abi: FoRToken
      startBlock: {{forTokenStartBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AllowedUser
        - User
      abis:
        - name: FoRToken
          file: ../contract/artifacts/contracts/FoRToken.sol/FoRToken.json
      eventHandlers:
        - event: AllowListAdded(indexed address)
          handler: handleAllowListAdded
        - event: AllowListRemoved(indexed address)
          handler: handleAllowListRemoved
      file: ./src/mapping.ts
